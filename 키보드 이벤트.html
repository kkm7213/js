<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>키보드 이벤트</title>
</head>
<style>
    section{
        display: inline-block;
        width: 300px;
        height: 300px;
        background-color: lightgray;
        border: 1px solid black;
    }
    section:nth-child(1){
        background-color: blueviolet;
    }
    section:nth-child(2){
        background-color: aqua;
    }
    section:nth-child(3){
        background-color: darkgreen;
    }
    section:nth-child(4){
        background-color: yellow;
    }
</style>
<body>

<section></section>
<section></section>
<section></section>
<section></section>

<textarea></textarea>
</body>
</html>
<script>
    // 문제. a s d f 각 키를 눌렀을 때, 키에 맞는 색상을 자신이 정해서,
    // 각 section의 배경색을 변경하세요.
    // 예시) a를 누르면 첫번째 section의 색이 빨강이 됩니다.
    // 단, 어떤 키를 눌렀을 때, 해당 박스의 색만 변경되어야 하고,
    // 나머지 박스는 색이 초기화되어야 합니다.
    let sections = document.querySelectorAll('section');
    let original = ['blueviolet', 'aqua', 'darkgreen', 'yellow']
    let change = ['red', 'blue', 'navy', 'darkorange']
    let keys = ['a', 's', 'd', 'f'];
    window.onkeydown = (event) => {
        for (let i = 0; i < sections.length; i++) {
            sections[i].style.backgroundColor = original[i];
        }

        for(let i = 0; i < sections.length; i++){
            if(event.key === keys[i]){
                sections[i].style.backgroundColor = change[i];

            }
        }
    }



    let textarea = document.querySelector('textarea');
    textarea.onkeydown = (event) => {
        console.log('keydown');
        let key = event.key;
        console.log(`눌린 key: ${key}`);
    }
    textarea.onkeyup = () => {
        console.log('keyup')
    }
    // input 요소(input, textarea)에 value 가 변경되면 실행
    // 데이터를 입력했거나, 체크박스 체크를 했거나.. 등등
    textarea.oninput = () => {
        let text = textarea.value; // 작성된 문자를 가져옴
        console.log(text.length); // 문자의 길이는?
    }


</script>
