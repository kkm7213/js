<script>
    var s = 'This is Test Message';
    console.log( s.length );

    /// s에서 'Message' 가져오기 연습

    var r = s.charAt(1); // 가져오고 싶은 문자의 위치
    console.log("r:", r);
    // 어떤 문자열로 끝나는지 확인 (true/false)
    var r = s.endsWith("Test Message");
    console.log("r:", r);
    // 어떤 문자열로 시작하는지 확인 (true/false)
    var r = s.startsWith("This");
    console.log("r:", r);
    // 어떤 문자열이 포함되어있는 문자열인가?
    var r = s.includes("is"); // (true/false)
    console.log("r:", r);
    // 어떤 문자열이 어느 위치(index)에 있는가?
    var r = s.indexOf("is");
    console.log("r:", r); // 2
    // s를 3번 반복한 문자열
    var r = s.repeat(3);
    console.log("r:", r);
    // 띄어쓰기 기준으로 문자열을 나눠줘

    var r = s.split(" ");
