<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>노드조작</title>
</head>
<body>
    0 <input type="text"> <br>
    1 <input type="text"> <br>
    2 <input type="text"> <br>
    3 <input type="text"> <br>
    4 <input type="text" value="글자"> <br>
    5 <input type="text"> <br>
    6 <input type="text" value="테스트!"> <br>




</body>
</html>
<script>
    let inputElem = document.createElement('input');
    document.body.appendChild(inputElem);
    inputElem.type = 'password';

    let ul = document.createElement('ul');
    document.body.appendChild(ul);

    for (let i = 0; i < 5; i++) {
        let li = document.createElement('li');
        li.textContent = 'hello';
        ul.appendChild(li);
    }

    ul.remove();
    /////////////////////////////////////////
    let inputs = document.querySelectorAll('input')
    inputs[0].setAttribute('value','안녕?');//없는 속성을 추가
    inputs[1].value = '안녕?';
    inputs[2].setAttribute('disabled', '');//속성 이름만 넣고 싶을 때
    inputs[3].setAttribute('type', 'number');//기존 속성을 변경
    //readonly 속성이 없으면 생성하고, 있으면 제거하는 toggle
    inputs[4].toggleAttribute('readonly');
    inputs[5].toggleAttribute('readonly', true);
    //readonly 속정을 제거하라
    inputs[6].removeAttribute('readonly');
    let v = inputs[6].value;
    console.log(v);//"테스트!"



</script>
