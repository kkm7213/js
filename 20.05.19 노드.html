<script>
    let body = window.document.body;
    let firstElem = body.firstElementChild; // body의 첫 자식 요소를 가져와
    let nextElem = firstElem.nextElementSibling; // 내 다음 요소 가져와
    console.log(body);
    console.log(firstElem);
    console.log(nextElem);
    /////////////////////////////////////////////
    let ul = document.getElementsByTagName('ul');
    console.log(ul);
    let li = document.getElementsByTagName('li');
    console.log(li);
    let p = document.getElementsByTagName('p');
    console.log(p);
    let arr = [110,111,112];
    arr[1] // 111
    ///////////////////////////////////////////////
    // Vanilla java script
    let inputs = document.getElementsByTagName('input');
    console.log(inputs);
    console.log( inputs[2] );
    ///////
    let numberInput = document.getElementById('number_input');
    console.log(numberInput);
    ///////
    let textInputs = document.getElementsByClassName('text_input');
    console.log(textInputs);
    ///////////////////////////////////////////////////////////
    document.querySelector('#number_input');
    let i = document.querySelector('input');
    console.log(i);

    let ii = document.querySelectorAll('input');

</script>
