<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>배열 심화</title>
</head>
<body>

</body>
</html>
<script>
    var arr = [10, 20, 30, 40, 50];
    console.log('arr:', arr);
    // 배열의 마지막에 요소(element)를 추가
    arr.push(60);
    console.log('arr:', arr);
    // 배열의 마지막에 요소 여러개 추가
    arr.push(70, 80, 90);
    console.log('arr:', arr);
    //// 배열에 있는 데이터 없애기 (pop)
    arr.pop(); // 마지막에 있는 데이터가 사라짐
    console.log('arr:', arr);
    // 없애기 + 가져오기
    var data = arr.pop(); // 뽑은 데이터를 data에 저장
    console.log('data:', data);
    console.log('arr:', arr);
    // 맨 처음 데이터를 제거하기+가져오기
    var data = arr.shift();
    console.log('data:', data);
    console.log('arr:', arr);
    /// 맨 처음에 데이터를 추가하기
    arr.unshift(-20, -10);
    console.log('arr:', arr);
    //////////////////////////////////////////
    var arr = [10, 20, 30, 40, 50];
    // 배열 역순으로 뒤집기
    arr.reverse();
    console.log('arr:', arr);
    // 배열 데이터 중 일부만 잘라서 가져오기
    arr.splice(2);
    console.log('arr:', arr);

    var arr = [10, 20, 30, 40, 50];
    arr.splice(2, 1); // index 2부터 1개 지워서 가져와
    console.log('arr:', arr);

    var arr = [10, 20, 30, 40, 50];
    arr.splice(1, 2); // index 1부터 2개 지워서 가져와
    console.log('arr:', arr);

    // 어떤 데이터가 index 몇 번 인지 찾기
    var arr = [10, 20, 30, 20, 50];
    var i = arr.indexOf(20); // 데이터 20을 찾아서 index 몇번?
    console.log('20의 index:', i);
    var i = arr.indexOf(123213); // 데이터 123213을 찾아서 index 몇번?
    console.log('123213의 index:', i); // 없으면 -1

    var arr = [10, 20, 30, 20, 50];
    var result = arr.slice(1, 4); // 일부만 잘라서 가져오기 (index 1부터 4(사실은 3)까지)
    console.log(result); // [20, 30, 20]

    // 배열 안의 데이터로 하나의 문자열 만들기
    var arr = [10, 20, 30, 40, 50];
    var result = arr.join(''); // 중간중간 '-' 를 넣어줘
    console.log(result);
</script>
