    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>객체</title>
</head>
<body>

</body>
</html>
<script>
    // 객체 == Object
    // key: value
    // 속성: 값
    var 게시글1번 = {
        번호: 1,
        작성자: '나',
        비밀번호: 1234,
    };
    var 게시글2번 = {
        번호: 2,
        작성자: '너',
        비밀번호: 5757,
    };
    console.log(게시글1번);
    console.log(게시글2번);
    // 객체가 가지는 value를 가져오기
    var writer = 게시글1번.작성자;
    console.log("작성자:", writer);
    // [] 를 사용해서 가져오기 (꼭 문자열로 묶기!)
    var writer = 게시글1번['작성자'];
    console.log("작성자:", writer);
    // 객체가 가지는 속성의 value를 변경하기
    게시글1번.작성자 = '나였다';
    console.log(게시글1번);
    // 객체에 속성을 추가하기
    // 아하.! 기존에 속성이 있으면 변경되고, 없으면 추가된다!
    게시글1번.작성날짜 = '2026-05-11';
    console.log(게시글1번);



</script>
